<html>
<head>
<title>Feedback Form</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<style>
    body{
        text-align: center;
        font-family: Arial, Helvetica, sans-serif;
        background: #82e5ee;
    }

    #form{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin: 30px;
    }

    .info{
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        text-align: left;
        transition: transform 0.3s;
    }
</style>
<body>

<h1>Your stories; Our stories.</h1>
<input type="text" class="name" placeholder="Enter your name:"><br><br>
<textarea class="feedback" placeholder="Enter your story:"></textarea>
<br><br>
<button id="submit">Submit</button>
    <div id="form">
        
    </div>
    

<script>
$(document).ready(function(){
$("#submit").click(function(){
var text=$(".feedback").val();
var name=$(".name").val();
if(text==""||name==""){
alert("Enter feedback");
}
else{
    $("#form").append(
            '<div class="info">' +
                '<p>' + text + '</p>' +
                '<h3>~' + name + '</h3>' +
            '</div>' 
    );

    $(".feedback").val("");
    $(".name").val("");
}
});
});
</script>
</body>
</html>
